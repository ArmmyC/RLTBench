benchmark:
  name: verilogeval
  root: benchmarks/verilog-eval
  split: null

model:
  preset: qwen36-27b
  base_url: null
  request_timeout: 300
  retries: 2

prompt:
  profile: neutral_baseline

generation:
  temperature: 0.2
  top_p: 0.95
  max_tokens: 2048

evaluation:
  executable: iverilog
  evaluation_timeout: 30

run:
  samples_per_task: 1
  workers: 1
  limit: 3
  output_dir: outputs/experiments/v0.3_prompt_profiles/verilogeval/neutral_baseline
