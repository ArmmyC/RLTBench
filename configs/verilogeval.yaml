benchmark:
  name: verilogeval
  root: benchmarks/verilog-eval
  split: null

model:
  name: null
  base_url: null
  api_key: null
  request_timeout: 300
  retries: 2
  # Qwen reasoning models may spend the full completion budget in hidden
  # thinking and return empty content. vLLM forwards this to the chat template.
  extra_body:
    chat_template_kwargs:
      enable_thinking: false

generation:
  temperature: 0.2
  top_p: 0.95
  max_tokens: 2048

evaluation:
  executable: iverilog
  evaluation_timeout: 30

run:
  samples_per_task: 1
  workers: 1
  limit: null
  output_dir: outputs
